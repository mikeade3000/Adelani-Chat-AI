services:
  - type: web
    name: adelani-ai-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        value: adelani2024
      - key: ADMIN_SECRET
        value: adelani-admin-2024
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://mikeade3000.github.io/Adelani-Chat-AI
      - key: BACKEND_URL
        value: https://adelani-ai-backend.onrender.com
