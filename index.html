/* ══════════ FILE PROCESSING ══════════ */
const FILE_ICONS={
  pdf:"📄",doc:"📝",docx:"📝",xls:"📊",xlsx:"📊",ppt:"📑",pptx:"📑",
  csv:"📊",txt:"📃",odt:"📝",
  jpg:"🖼️",jpeg:"🖼️",png:"🖼️",gif:"🖼️",webp:"🖼️",svg:"🎨",tiff:"🖼️",tif:"🖼️",
  mp3:"🎵",wav:"🎵",flac:"🎵",mp4:"🎬",avi:"🎬",mov:"🎬",mkv:"🎬",
  zip:"🗜️",rar:"🗜️","7z":"🗜️",iso:"💿",exe:"⚙️"
};
const IMG_EXT    =["jpg","jpeg","png","gif","webp","tiff","tif"];
const AUDIO_EXT  =["mp3","wav","flac"];
const VIDEO_EXT  =["mp4","avi","mov","mkv"];
const ARCHIVE_EXT=["zip","rar","7z","iso"];

function loadScript(url){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${url}"]`)){res();return;}
    const s=document.createElement("script");
    s.src=url;s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}
const toBase64=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});
const readText=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(f);});
const readAB  =f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsArrayBuffer(f);});
const fmtSize =b=>b<1024?b+"B":b<1048576?(b/1024).toFixed(1)+"KB":(b/1048576).toFixed(1)+"MB";

async function extractPDF(file){
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const ab=await readAB(file);
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  let text=`[PDF — ${pdf.numPages} page${pdf.numPages>1?"s":""}]\n\n`;
  const pages=Math.min(pdf.numPages,25);
  for(let i=1;i<=pages;i++){
    const page=await pdf.getPage(i);
    const c=await page.getTextContent();
    text+=`--- Page ${i} ---\n`+c.items.map(s=>s.str).join(" ")+"\n\n";
  }
  if(pdf.numPages>25) text+=`\n[Showing first 25 of ${pdf.numPages} pages]`;
  return text.trim()||"[No extractable text found — PDF may be image-based/scanned]";
}

async function extractDOCX(file){
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js");
  const ab=await readAB(file);
  const r=await mammoth.extractRawText({arrayBuffer:ab});
  return r.value||"[No text extracted from document]";
}

async function extractExcel(file){
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js");
  const ab=await readAB(file);
  const wb=XLSX.read(ab,{type:"array"});
  let text="";
  wb.SheetNames.forEach(name=>{
    text+=`\n=== Sheet: ${name} ===\n`;
    text+=XLSX.utils.sheet_to_csv(wb.Sheets[name]);
  });
  return text.trim()||"[Empty spreadsheet]";
}

async function extractPPTX(file){
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js");
  const ab=await readAB(file);
  const zip=await JSZip.loadAsync(ab);
  const slides=Object.keys(zip.files).filter(n=>/ppt\/slides\/slide\d+\.xml/.test(n)).sort((a,b)=>{
    const na=parseInt(a.match(/slide(\d+)/)?.[1]||0);
    const nb=parseInt(b.match(/slide(\d+)/)?.[1]||0);
    return na-nb;
  });
  let text=`[PowerPoint — ${slides.length} slide${slides.length!==1?"s":""}]\n\n`;
  for(const sf of slides.slice(0,40)){
    const xml=await zip.files[sf].async("string");
    const t=xml.replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
    const n=sf.match(/slide(\d+)/)?.[1];
    if(t) text+=`--- Slide ${n} ---\n${t}\n\n`;
  }
  return text.trim()||"[No text found in presentation]";
}

async function extractODT(file){
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js");
  const ab=await readAB(file);
  const zip=await JSZip.loadAsync(ab);
  if(!zip.files["content.xml"]) return "[Could not read ODT content]";
  const xml=await zip.files["content.xml"].async("string");
  return xml.replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
}

async function processFile(file){
  const ext=file.name.split(".").pop().toLowerCase();
  const name=file.name;
  const size=fmtSize(file.size);
  const icon=FILE_ICONS[ext]||"📎";

  try{
    /* ── Images → vision model ── */
    if(IMG_EXT.includes(ext)){
      const data=await toBase64(file);
      return{type:"image",data,name,ext,icon,size};
    }
    /* ── SVG → treat as text ── */
    if(ext==="svg"){
      const content=await readText(file);
      return{type:"document",content:`SVG file "${name}":\n\n${content.slice(0,12000)}`,name,ext,icon,size};
    }
    /* ── Plain text ── */
    if(ext==="txt"){
      const content=await readText(file);
      return{type:"document",content:`Text file "${name}":\n\n${content.slice(0,12000)}`,name,ext,icon,size};
    }
    /* ── CSV ── */
    if(ext==="csv"){
      const content=await readText(file);
      return{type:"document",content:`CSV data from "${name}":\n\n${content.slice(0,12000)}`,name,ext,icon,size};
    }
    /* ── PDF ── */
    if(ext==="pdf"){
      const content=await extractPDF(file);
      return{type:"document",content:`PDF document "${name}":\n\n${content.slice(0,12000)}`,name,ext,icon,size};
    }
    /* ── DOCX ── */
    if(ext==="docx"){
      const content=await extractDOCX(file);
      return{type:"document",content:`Word document "${name}":\n\n${content.slice(0,12000)}`,name,ext,icon,size};
    }
    /* ── DOC (legacy) ── */
    if(ext==="doc"){
      try{
        const content=await extractDOCX(file);
        return{type:"document",content:`Word document "${name}":\n\n${content.slice(0,12000)}`,name,ext,icon,size};
      }catch{
        return{type:"unsupported",name,ext,icon,size,reason:"Old .doc format could not be read. Please save as .docx and try again."};
      }
    }
    /* ── Excel ── */
    if(["xlsx","xls"].includes(ext)){
      const content=await extractExcel(file);
      return{type:"document",content:`Spreadsheet "${name}":\n\n${content.slice(0,12000)}`,name,ext,icon,size};
    }
    /* ── PowerPoint ── */
    if(ext==="pptx"){
      const content=await extractPPTX(file);
      return{type:"document",content:`PowerPoint "${name}":\n\n${content.slice(0,12000)}`,name,ext,icon,size};
    }
    /* ── PPT (legacy) ── */
    if(ext==="ppt"){
      return{type:"unsupported",name,ext,icon,size,reason:"Old .ppt format cannot be read. Please save as .pptx and try again."};
    }
    /* ── ODT ── */
    if(ext==="odt"){
      const content=await extractODT(file);
      return{type:"document",content:`ODT document "${name}":\n\n${content.slice(0,12000)}`,name,ext,icon,size};
    }
    /* ── Audio ── */
    if(AUDIO_EXT.includes(ext)){
      return{type:"unsupported",name,ext,icon,size,reason:`Audio files (.${ext}) cannot be transcribed yet. This feature is coming soon.`};
    }
    /* ── Video ── */
    if(VIDEO_EXT.includes(ext)){
      return{type:"unsupported",name,ext,icon,size,reason:`Video files (.${ext}) cannot be analysed yet. This feature is coming soon.`};
    }
    /* ── Archives ── */
    if(ARCHIVE_EXT.includes(ext)){
      return{type:"unsupported",name,ext,icon,size,reason:`Archive files (.${ext}) cannot be extracted in the browser.`};
    }
    /* ── Executable ── */
    if(ext==="exe"){
      return{type:"unsupported",name,ext,icon,size,reason:"Executable files (.exe) cannot be analysed for security reasons."};
    }
    return{type:"unsupported",name,ext,icon,size,reason:`Unsupported file type: .${ext}`};
  }catch(err){
    return{type:"error",name,ext,icon,size,reason:`Could not read file: ${err.message}`};
  }
}

/* ══════════ MARKDOWN ══════════ */
function md(raw,accent,dark){
  const cc=dark?"rgba(255,255,255,.09)":"rgba(0,0,0,.07)";
  const pc=dark?"#0F0F11":"#EDE8DF";
  let t=raw.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  t=t.replace(/```[\w]*\n?([\s\S]*?)```/g,`<pre style="background:${pc};border:1px solid ${dark?"#222":"#ddd"}"><code>$1</code></pre>`);
  t=t.replace(/`([^`\n]+)`/g,`<code style="background:${cc}">$1</code>`);
  t=t.replace(/\*\*([^*\n]+)\*\*/g,"<strong>$1</strong>");
  t=t.replace(/\*([^*\n]+)\*/g,"<em>$1</em>");
  t=t.replace(/^### (.+)$/gm,'<div class="h3">$1</div>');
  t=t.replace(/^## (.+)$/gm,'<div class="h2">$1</div>');
  t=t.replace(/^# (.+)$/gm,'<div class="h1">$1</div>');
  t=t.replace(/^\d+\.\s(.+)$/gm,(m,p,off,s)=>{
    const n=s.slice(0,off).split("\n").filter(l=>/^\d+\./.test(l)).length+1;
    return `<div class="li"><span style="color:${accent};font-weight:700;flex-shrink:0;min-width:20px">${n}.</span><span>${p}</span></div>`;
  });
  t=t.replace(/^[-*]\s(.+)$/gm,`<div class="li"><span style="color:${accent};font-weight:700;flex-shrink:0">•</span><span>$1</span></div>`);
  t=t.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,`<a href="$2" target="_blank" style="color:${accent};text-decoration:underline">$1</a>`);
  t=t.replace(/\n/g,"<br/>");
  return t;
}

function Globe(){
  const frames=["🌍","🌍","🌎","🌎","🌏","🌏"];
  const [i,setI]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setI(x=>(x+1)%frames.length),320);return()=>clearInterval(t);},[]);
  return <div style={{fontSize:76,lineHeight:1,marginBottom:16,display:"inline-block",animation:"globePulse 3s ease-in-out infinite"}}>{frames[i]}</div>;
}

/* ══════════ BUBBLE ══════════ */
function Bubble({msg,agent,t,dark}){
  const u=msg.role==="user";
  return(
    <div style={{display:"flex",justifyContent:u?"flex-end":"flex-start",marginBottom:16,gap:9,animation:"fadeUp .3s ease"}}>
      {!u&&<div style={{width:32,height:32,borderRadius:"50%",background:`${agent.color}20`,border:`1.5px solid ${agent.color}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:agent.color,flexShrink:0,marginTop:2}}>{agent.icon}</div>}
      <div style={{maxWidth:"78%",display:"flex",flexDirection:"column",alignItems:u?"flex-end":"flex-start"}}>
        {/* File card for uploaded files */}
        {msg.fileName&&(
          <div style={{marginBottom:6}}>
            <FileCard name={msg.fileName} icon={msg.fileIcon||"📎"} size={msg.fileSize||""} ext={msg.fileExt} color={u?agent.color:undefined} dark={dark} t={t}/>
          </div>
        )}
        {/* Image preview */}
        {msg.image&&<img src={`data:image/jpeg;base64,${msg.image}`} style={{maxWidth:200,borderRadius:10,marginBottom:6,border:`1px solid ${t.border}`}} alt=""/>}
        {/* Message bubble */}
        {msg.content&&(
          <div className="md" style={{padding:"12px 16px",borderRadius:u?"18px 18px 4px 18px":"18px 18px 18px 4px",background:u?`linear-gradient(135deg,${agent.color}E0,${agent.color}A0)`:t.bub,color:u?"#FFF":t.text,fontSize:15.5,lineHeight:1.75,wordBreak:"break-word",border:u?"none":`1px solid ${t.bubBrd}`,boxShadow:u?`0 3px 16px ${agent.color}30`:"0 2px 6px rgba(0,0,0,.08)"}}
            dangerouslySetInnerHTML={u?undefined:{__html:md(msg.content,agent.color,dark)}}>
            {u?msg.content:undefined}
          </div>
        )}
        <div style={{fontSize:11.5,color:t.muted,marginTop:3}}>{fmtTime(msg.timestamp)}</div>
      </div>
    </div>
  );
}

/* ══════════ ADMIN PANEL ══════════ */
function AdminPanel({onBack,t,dark,toggleTheme}){
  const SECRET="adelani-admin-2024";
  const [users,setUsers]=useState([]);
  const [busy,setBusy]=useState(false);
  const [toast,setToast]=useState("");
  const showT=m=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  useEffect(()=>{(async()=>{setBusy(true);try{const r=await fetch(BACKEND+"/api/admin/users?secret="+SECRET);const d=await r.json();if(Array.isArray(d))setUsers(d);}catch{}setBusy(false);})();},[]);
  const act=async(username,action)=>{
    try{const r=await fetch(BACKEND+"/api/admin/action",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({secret:SECRET,username,action})});
      const d=await r.json();if(d.success){setUsers(p=>action==="delete"?p.filter(u=>u.username!==username):p.map(u=>u.username===username?{...u,...d.user}:u));showT("Done!");}}

    <div style={{height:"100%",background:t.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>

                {!u.activated&&<button onPointerDown={()=>act(u.username,"activate")} style={{padding:"5px 11px",borderRadius:7,background:"rgba(39,174,96,.12)",border:"1px solid rgba(39,174,96,.3)",color:"#27AE60",fontSize:12,fontWeight:600,cursor:"pointer"}}>Activate</button>}
                {u.activated&&<button onPointerDown={()=>act(u.username,"deactivate")} style={{padding:"5px 11px",borderRadius:7,background:"rgba(230,126,34,.1)",border:"1px solid rgba(230,126,34,.3)",color:"#E67E22",fontSize:12,cursor:"pointer"}}>Revoke</button>}
                <button onPointerDown={()=>act(u.username,u.banned?"unban":"ban")} style={{padding:"5px 11px",borderRadius:7,background:u.banned?"rgba(39,174,96,.1)":"rgba(192,57,43,.1)",border:`1px solid ${u.banned?"rgba(39,174,96,.3)":"rgba(192,57,43,.3)"}`,color:u.banned?"#27AE60":"#C0392B",fontSize:12,cursor:"pointer"}}>{u.banned?"Restore":"Suspend"}</button>
                <button onPointerDown={()=>act(u.username,"delete")} style={{padding:"5px 10px",borderRadius:7,background:t.inp,border:`1px solid ${t.border}`,color:t.muted,fontSize:12,cursor:"pointer"}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      </div>
      {toast&&<div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"9px 18px",fontSize:13.5,color:t.text,zIndex:200}}>{toast}</div>}
    </div>
  );
}

/* ══════════ MAIN APP ══════════ */
function App(){
  const [view,setView]           = useState("loading");
  const [user,setUser]           = useState(null);
  const [isGuest,setGuest]       = useState(false);
  const [theme,setTheme]         = useState("light");
  const [agent,setAgent]         = useState(AGENTS[0]);
  const [convs,setConvs]         = useState({});
  const [input,setInput]         = useState("");
  const [busy,setBusy]           = useState(false);
  const [attachment,setAttachment] = useState(null); // {type,data/content,name,ext,icon,size}
  const [processing,setProcessing] = useState(false); // file being processed
  const [sideOpen,setSide]       = useState(window.innerWidth>=720);
  const [showLimit,setShowLimit] = useState(false);
  const [toast,setToast]         = useState("");
  const [mobile,setMobile]       = useState(window.innerWidth<720);

  const botRef=useRef(null),fileRef=useRef(null),recRef=useRef(null),taRef=useRef(null);
  const t=TH[theme];const dark=theme==="dark";const msgs=convs[agent.id]||[];

  useEffect(()=>{const fn=()=>setMobile(window.innerWidth<720);window.addEventListener("resize",fn);return()=>window.removeEventListener("resize",fn);},[]);
  useEffect(()=>{
    const th=ls.get("adl-theme");if(th)setTheme(th);
    const ses=ls.get("adl-ses");
    if(ses&&ses.expiresAt>Date.now()){setUser(ses);setView("chat");}
    else setView("auth");
  },[]);
  useEffect(()=>{const k=user?`adl-m-${user.id}-${agent.id}`:`adl-gm-${agent.id}`;const r=ls.get(k);if(r)setConvs(p=>({...p,[agent.id]:r}));},[agent.id,user?.id]);
  useEffect(()=>{if(!msgs.length)return;const k=user?`adl-m-${user.id}-${agent.id}`:`adl-gm-${agent.id}`;ls.set(k,msgs.slice(-80));},[msgs,agent.id,user?.id]);
  useEffect(()=>{botRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,busy]);

  const toggleTheme=()=>{const n=dark?"light":"dark";setTheme(n);ls.set("adl-theme",n);};
  const showT=m=>{setToast(m);setTimeout(()=>setToast(""),2800);};
  const logout=()=>{ls.del("adl-ses");setUser(null);setGuest(false);setConvs({});setView("auth");};
  const switchAgent=a=>{setAgent(a);if(mobile)setSide(false);};

  /* ── File handler ── */
  const handleFile=async(e)=>{
    const f=e.target.files[0];if(!f)return;
    e.target.value="";
    setProcessing(true);
    const result=await processFile(f);
    setProcessing(false);
    if(result.type==="unsupported"||result.type==="error"){
      showT(result.reason);
      return;
    }
    setAttachment(result);
  };

  /* ── SEND ── */
  const send=useCallback(async()=>{
    const text=(input||"").trim();
    if(!text&&!attachment)return;
    if(busy)return;
    if(user?.role!=="admin"&&limitHit()){setShowLimit(true);return;}

    /* Build user message */
    const msgMeta={
      role:"user",
      timestamp:new Date().toISOString(),
      fileName:attachment?.name||null,
      fileIcon:attachment?.icon||null,
      fileExt:attachment?.ext||null,
      fileSize:attachment?.size||null,
    };

    let msgContent=text;
    let msgImage=null;

    if(attachment?.type==="image"){
      msgImage=attachment.data;
      msgContent=text||"Please analyse this image in detail.";
    } else if(attachment?.type==="document"){
      // Prepend file content to message
      msgContent=attachment.content+"\n\n"+(text||"Please analyse and summarise the above document.");
    }

    const um={...msgMeta,content:msgContent,image:msgImage};
    const hist=[...msgs,um];
    setConvs(p=>({...p,[agent.id]:hist}));
    setInput("");setAttachment(null);setBusy(true);
    if(taRef.current)taRef.current.style.height="auto";
    if(user?.role!=="admin")bumpUsage();

    /* Build API messages */
    const apiMessages=hist.map(m=>{
      if(m.image){
        return{role:m.role,content:[
          {type:"text",text:m.content||"Describe this image."},
          {type:"image_url",image_url:{url:"data:image/jpeg;base64,"+m.image,detail:"high"}}
        ]};
      }
      return{role:m.role,content:m.content};
    });

    const ses=ls.get("adl-ses")||{};
    const payload={
      messages:apiMessages,
      systemPrompt:agent.system,
      model:"meta-llama/llama-3.1-8b-instruct",
      hasImage:hist.some(m=>m.image),
      username:ses.username||null,
      sessionToken:ses.sessionToken||null
    };

    const MAX_WAIT=75000,RETRY_GAP=6000,started=Date.now();
    let reply=null,attempt=0;

    while(Date.now()-started<MAX_WAIT){
      attempt++;
      try{
        const r=await fetch(BACKEND+"/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
        const d=await r.json();
        reply=d.reply||(d.error?"⚠️ "+d.error:"No response.");
        break;
      }catch(e){
        if(attempt===1){
          setConvs(p=>({...p,[agent.id]:[...hist,{role:"assistant",content:"⏳ Connecting...",timestamp:new Date().toISOString()}]}));
        }
        if(Date.now()-started+RETRY_GAP<MAX_WAIT) await new Promise(r=>setTimeout(r,RETRY_GAP));
        else break;
      }
    }

    setConvs(p=>({...p,[agent.id]:[
      ...hist,
      {role:"assistant",content:reply||"⚠️ Service temporarily unavailable. Please try again.",timestamp:new Date().toISOString()}
    ]}));
    setBusy(false);
  },[input,attachment,busy,msgs,agent,user]);

  const clearChat=()=>{setConvs(p=>({...p,[agent.id]:[]}));ls.del(user?`adl-m-${user.id}-${agent.id}`:`adl-gm-${agent.id}`);showT("Chat cleared");};
  const exportChat=()=>{
    if(!msgs.length){showT("Nothing to export.");return;}
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Adelani AI</title><style>body{font-family:Georgia,serif;max-width:720px;margin:40px auto;color:#1a1208;padding:24px}h1{font-size:26px;margin-bottom:4px}h2{font-size:12px;color:#999;letter-spacing:2px;text-transform:uppercase;font-weight:400;margin:4px 0 24px}.m{margin:12px 0;padding:13px 16px;border-radius:11px}.u{background:#f5f0e3;margin-left:60px}.a{background:#fff;border:1px solid #e0d8cc;margin-right:60px}.role{font-size:11px;font-weight:700;text-transform:uppercase;color:#999;margin-bottom:5px}.txt{font-size:14px;line-height:1.75;white-space:pre-wrap}.ts{font-size:10px;color:#ccc;margin-top:5px}</style></head><body><h1>Adelani AI</h1><h2>${agent.name} · ${agent.role}</h2>${msgs.map(m=>`<div class="m ${m.role==="user"?"u":"a"}"><div class="role">${m.role==="user"?"You":agent.name}</div><div class="txt">${(m.content||"").replace(/</g,"&lt;")}</div><div class="ts">${new Date(m.timestamp).toLocaleString()}</div></div>`).join("")}<p style="margin-top:32px;font-size:11px;color:#ccc;border-top:1px solid #eee;padding-top:16px">Adelani AI Chat · ${new Date().toLocaleString()}</p></body></html>`;
    const w=window.open("","_blank");if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),400);}else showT("Allow popups to export.");
  };

  /* ── ACCEPTED FILE TYPES ── */
  const ACCEPT=[
    "image/jpeg","image/png","image/gif","image/webp","image/svg+xml","image/tiff",
    "text/plain","text/csv",
    "application/pdf",
    "application/vnd.openxmlformats-officedocument.wordprocessingml.document","application/msword",
    "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet","application/vnd.ms-excel",
    "application/vnd.openxmlformats-officedocument.presentationml.presentation","application/vnd.ms-powerpoint",
    "application/vnd.oasis.opendocument.text",
    "audio/mpeg","audio/wav","audio/flac",
    "video/mp4","video/x-msvideo","video/quicktime","video/x-matroska",
    "application/zip","application/x-rar-compressed","application/x-7z-compressed",
    ".txt,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.csv,.odt,.jpg,.jpeg,.png,.gif,.svg,.webp,.tiff,.tif,.mp3,.wav,.flac,.mp4,.avi,.mov,.mkv,.zip,.rar,.7z,.iso,.exe"
  ].join(",");

  if(view==="loading") return(
    <div style={{height:"100%",background:"#F2ECE0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,background:"linear-gradient(135deg,#D4900A,#C05020)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Adelani AI</div>
      <div style={{width:32,height:32,border:"3px solid rgba(212,144,10,.2)",borderTopColor:"#D4900A",borderRadius:"50%",animation:"spin .9s linear infinite"}}/>
    </div>
  );
  if(view==="auth")  return <AuthScreen onAuth={u=>{setUser(u);setGuest(false);setView("chat");}} onGuest={()=>{setGuest(true);setView("chat");}} t={t} dark={dark}/>;
  if(view==="admin") return <AdminPanel onBack={()=>setView("chat")} t={t} dark={dark} toggleTheme={toggleTheme}/>;

  return(
    <>
    <style>{`body,#root{background:${t.bg}} .md code{background:${dark?"rgba(255,255,255,.08)":"rgba(0,0,0,.06)"}} .md pre{background:${dark?"#0F0F11":"#EDE8DF"};border:1px solid ${t.border}} .md .h1,.md .h2,.md .h3{color:${t.text}} textarea::placeholder,input::placeholder{color:${t.dim}}`}</style>
    {showLimit&&<LimitModal t={t} dark={dark} onClose={()=>setShowLimit(false)}/>}
    <div style={{position:"fixed",top:"-25%",left:"-20%",width:"70%",height:"70%",borderRadius:"50%",background:`radial-gradient(circle,${agent.color}0A,transparent 70%)`,pointerEvents:"none",zIndex:0,animation:"orb1 14s ease-in-out infinite"}}/>
    <div style={{position:"fixed",bottom:"-20%",right:"-15%",width:"55%",height:"55%",borderRadius:"50%",background:"radial-gradient(circle,rgba(192,80,32,.05),transparent 70%)",pointerEvents:"none",zIndex:0,animation:"orb2 18s ease-in-out infinite"}}/>

    <div style={{display:"flex",height:"100%",position:"relative",overflow:"hidden"}}>
      {!mobile&&(
        <div style={{width:sideOpen?258:0,minWidth:sideOpen?258:0,transition:"width .3s ease,min-width .3s ease",overflow:"hidden",borderRight:`1px solid ${t.border}`,flexShrink:0,zIndex:10}}>
          <div style={{width:258,height:"100%"}}>
            <Sidebar t={t} dark={dark} agent={agent} agents={AGENTS} user={user} isGuest={isGuest} onSwitch={switchAgent} onAdmin={()=>setView("admin")} onLogout={logout}/>
          </div>
        </div>
      )}
      {mobile&&sideOpen&&(
        <>
          <div onPointerDown={()=>setSide(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:40,animation:"fadeIn .2s ease"}}/>
          <div style={{position:"fixed",top:0,left:0,width:"82%",maxWidth:300,height:"100%",zIndex:50,border:`1px solid ${t.border}`,animation:"slideIn .25s ease"}}>
            <Sidebar t={t} dark={dark} agent={agent} agents={AGENTS} user={user} isGuest={isGuest} onSwitch={switchAgent} onAdmin={()=>{setView("admin");setSide(false);}} onLogout={logout}/>
          </div>
        </>
      )}

      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0,zIndex:1}}>
        {/* Header */}
        <div style={{height:56,padding:`0 ${mobile?"12px":"16px"}`,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${t.border}`,background:t.surf,backdropFilter:"blur(16px)",flexShrink:0,zIndex:5}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onPointerDown={()=>setSide(o=>!o)} style={{width:36,height:36,borderRadius:9,background:t.inp,border:`1px solid ${t.border}`,color:t.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{sideOpen?(mobile?"✕":"←"):"☰"}</button>
            {mobile
              ?<div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,background:"linear-gradient(135deg,#D4900A,#C05020)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Adelani AI</div>
              :<><div style={{width:32,height:32,borderRadius:9,background:`${agent.color}14`,border:`1.5px solid ${agent.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:agent.color}}>{agent.icon}</div>
                <div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,color:t.text}}>{agent.name}</div><div style={{fontSize:11.5,color:t.muted}}>{agent.role}</div></div>
                {agent.web&&<span style={{padding:"2px 8px",borderRadius:20,background:`${agent.color}12`,border:`1px solid ${agent.color}26`,fontSize:9.5,color:agent.color,fontWeight:700}}>● LIVE</span>}
              </>}
          </div>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            {!mobile&&<>{AGENTS.map(a=><button key={a.id} onPointerDown={()=>setAgent(a)} title={a.name} style={{width:30,height:30,borderRadius:8,background:agent.id===a.id?`${a.color}14`:t.inp,border:agent.id===a.id?`1.5px solid ${a.color}32`:`1px solid ${t.border}`,color:a.color,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{a.icon}</button>)}
            <div style={{width:1,height:20,background:t.border,margin:"0 2px"}}/></>}
            <button onPointerDown={toggleTheme} style={{width:36,height:36,borderRadius:9,background:t.inp,border:`1px solid ${t.border}`,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{dark?"☀️":"🌙"}</button>
            <button onPointerDown={exportChat} style={{width:36,height:36,borderRadius:9,background:t.inp,border:`1px solid ${t.border}`,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:t.muted,cursor:"pointer"}}>📄</button>
            {!mobile&&<button onPointerDown={clearChat} style={{height:36,padding:"0 12px",borderRadius:9,background:t.inp,border:`1px solid ${t.border}`,color:t.muted,fontSize:13,cursor:"pointer"}}>Clear</button>}
          </div>
        </div>

        {/* Mobile agent strip */}
        {mobile&&(
          <div style={{padding:"6px 10px",borderBottom:`1px solid ${t.border}`,background:t.surf,display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <div style={{width:20,height:20,borderRadius:6,background:`${agent.color}14`,border:`1px solid ${agent.color}28`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:agent.color}}>{agent.icon}</div>
            <span style={{fontFamily:"'Syne',sans-serif",fontWeight:600,fontSize:13,color:agent.color}}>{agent.name}</span>
            <span style={{fontSize:12,color:t.muted,flex:1}}>· {agent.role}</span>
            {agent.web&&<span style={{fontSize:9.5,color:agent.color,fontWeight:700}}>LIVE</span>}
            <button onPointerDown={clearChat} style={{background:"transparent",border:`1px solid ${t.border}`,borderRadius:6,padding:"3px 9px",color:t.muted,fontSize:11.5,cursor:"pointer"}}>Clear</button>
          </div>
        )}

        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:mobile?"14px 13px 8px":"20px 24px 8px",display:"flex",flexDirection:"column"}}>
          {msgs.length===0&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"28px 18px",animation:"fadeUp .5s ease"}}>
              <div style={{width:70,height:70,borderRadius:20,background:`${agent.color}14`,border:`2px solid ${agent.color}28`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,color:agent.color,marginBottom:18}}>{agent.icon}</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:mobile?21:24,fontWeight:700,color:t.text,marginBottom:7}}>Hello, I'm {agent.name}</div>
              <div style={{fontSize:14.5,color:t.muted,maxWidth:320,lineHeight:1.65,marginBottom:10}}>{agent.role} · Powered by Adelani AI</div>
              <div style={{fontSize:13,color:t.muted,marginBottom:20,padding:"6px 14px",borderRadius:20,background:t.inp,border:`1px solid ${t.border}`}}>
                📎 Supports: PDF, Word, Excel, PowerPoint, CSV, images & more
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:7,justifyContent:"center",maxWidth:430}}>
                {[
                  agent.id==="asha"?"What can you help me with?":null,
                  agent.id==="scholar"?"Help me design a curriculum":null,
                  agent.id==="bizna"?"African startup ideas for 2025":null,
                  agent.id==="dawa"?"Daily habits for better health":null,
                  agent.id==="ubuntu"?"Teach me a Yoruba proverb":null,
                  agent.id==="nexus"?"What's trending in AI today?":null,
                  "Explain something complex simply",
                  "Help me think through an idea"
                ].filter(Boolean).slice(0,4).map(p=>(
                  <button key={p} onPointerDown={()=>{setInput(p);taRef.current?.focus();}} style={{padding:"8px 14px",borderRadius:20,background:t.inp,border:`1px solid ${agent.color}24`,color:t.muted,fontSize:13.5,cursor:"pointer"}}>{p}</button>
                ))}
              </div>
            </div>
          )}
          {msgs.map((m,i)=><Bubble key={i} msg={m} agent={agent} t={t} dark={dark}/>)}
          {busy&&(
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14,animation:"fadeUp .3s ease"}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:`${agent.color}14`,border:`1.5px solid ${agent.color}28`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:agent.color}}>{agent.icon}</div>
              <div style={{background:t.bub,borderRadius:"16px 16px 16px 4px",border:`1px solid ${t.bubBrd}`}}><Dots color={agent.color}/></div>
            </div>
          )}
          <div ref={botRef}/>
        </div>

        {/* Mobile bottom nav */}

              placeholder={attachment?`Ask about ${attachment.name||"the file"}...`:(agent.web?`Ask ${agent.name} to search...`:`Message ${agent.name}...`)}
              rows={1} style={{flex:1,color:t.text,fontSize:15.5,lineHeight:1.7,fontFamily:"'DM Sans',sans-serif",maxHeight:130,overflowY:"auto",paddingTop:3}}
              onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,130)+"px";}}/>

            {/* Send button */}
            <button type="button" onPointerDown={send}
              style={{width:37,height:37,borderRadius:10,flexShrink:0,
                background:`linear-gradient(135deg,${agent.color},${agent.color}BB)`,
                border:"none",color:"#FFF",fontSize:18,
                display:"flex",alignItems:"center",justifyContent:"center",
                cursor:"pointer",
                opacity:(busy||(!input.trim()&&!attachment))?.4:1,
                boxShadow:`0 3px 14px ${agent.color}30`,
                transition:"opacity .15s"}}>
              {busy?<Spinner size={15}/>:"↑"}
            </button>
          </div>

          {!mobile&&(
            <div style={{textAlign:"center",fontSize:11,color:t.dim,marginTop:6,opacity:.65}}>
              Adelani AI · 6 Agents · PDF · Word · Excel · PowerPoint · CSV · Images · Voice
            </div>
          )}
        </div>
      </div>
    </div>

    {toast&&<div style={{position:"fixed",bottom:mobile?88:20,left:"50%",transform:"translateX(-50%)",background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"9px 18px",fontSize:13.5,color:t.text,boxShadow:"0 6px 24px rgba(0,0,0,.15)",zIndex:400,whiteSpace:"nowrap",animation:"fadeUp .3s ease"}}>{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
