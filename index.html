/* ── Daily limit helpers ────────────────────────────────────── */
function getDailyUsage(){ return ls.get(`adelani-daily-${today()}`) || {count:0}; }
function incrementDailyUsage(){ const u=getDailyUsage(); ls.set(`adelani-daily-${today()}`,{count:u.count+1}); }
function isLimitReached(){ return getDailyUsage().count >= DAILY_LIMIT; }

/* ── Rotating Globe component ───────────────────────────────── */
function RotatingGlobe(){
  const frames = ["🌍","🌍","🌍","🌎","🌎","🌎","🌏","🌏","🌏"];
  const [idx,setIdx] = useState(0);
  useEffect(()=>{
    const t=setInterval(()=>setIdx(i=>(i+1)%frames.length), 280);
    return ()=>clearInterval(t);
  },[]);
  return(
    <div style={{
      fontSize:82,
      lineHeight:1,
      marginBottom:18,
      display:"inline-block",
      animation:"globePulse 3s ease-in-out infinite",
      cursor:"default",
      userSelect:"none"
    }}>
      {frames[idx]}
    </div>
  );
}

/* ── Markdown renderer ──────────────────────────────────────── */
function renderMd(raw,accent,dark){
  const cc=dark?"rgba(255,255,255,0.09)":"rgba(0,0,0,0.07)";
  const pc=dark?"#0F0F11":"#F0EBE0";
  let t=raw.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  t=t.replace(/```[\w]*\n?([\s\S]*?)```/g,`<pre style="background:${pc};border:1px solid ${dark?"#222":"#ddd"};padding:13px;border-radius:10px;overflow-x:auto;margin:10px 0"><code>$1</code></pre>`);
  t=t.replace(/`([^`\n]+)`/g,`<code style="background:${cc};padding:2px 7px;border-radius:5px">$1</code>`);
  t=t.replace(/\*\*\*([^*\n]+)\*\*\*/g,"<strong><em>$1</em></strong>");
  t=t.replace(/\*\*([^*\n]+)\*\*/g,"<strong>$1</strong>");
  t=t.replace(/\*([^*\n]+)\*/g,"<em>$1</em>");
  t=t.replace(/^### (.+)$/gm,'<div class="mh3">$1</div>');
  t=t.replace(/^## (.+)$/gm,'<div class="mh2">$1</div>');
  t=t.replace(/^# (.+)$/gm,'<div class="mh1">$1</div>');
  t=t.replace(/^\d+\. (.+)$/gm,(m,p,off,s)=>{const n=s.slice(0,off).split("\n").filter(l=>/^\d+\./.test(l)).length+1;return `<div class="mli"><span style="color:${accent};flex-shrink:0;min-width:20px;font-weight:700">${n}.</span><span>${p}</span></div>`;});
  t=t.replace(/^[-*] (.+)$/gm,`<div class="mli"><span style="color:${accent};flex-shrink:0;font-weight:700">•</span><span>$1</span></div>`);
  t=t.replace(/\n/g,"<br/>");
  return t;
}

/* ── Typing dots ────────────────────────────────────────────── */

}

/* ── Chat bubble ────────────────────────────────────────────── */
function Bubble({msg,agent,t,dark}){
  const [cp,setCp]=useState(false);
  const u=msg.role==="user";
  const copy=()=>{navigator.clipboard?.writeText(msg.content).then(()=>{setCp(true);setTimeout(()=>setCp(false),1800);});};
  return(
    <div style={{display:"flex",justifyContent:u?"flex-end":"flex-start",marginBottom:18,gap:10,animation:"fup 0.3s ease"}}>
      {!u&&<div style={{width:34,height:34,borderRadius:"50%",background:`${agent.color}22`,border:`1.5px solid ${agent.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:agent.color,flexShrink:0,marginTop:2}}>{agent.icon}</div>}
      <div style={{maxWidth:"76%",display:"flex",flexDirection:"column",alignItems:u?"flex-end":"flex-start"}}>
        {msg.image&&<img src={`data:image/jpeg;base64,${msg.image}`} style={{maxWidth:200,borderRadius:12,marginBottom:6,border:`1px solid ${t.border}`}} alt=""/>}
        <div style={{position:"relative"}}>
          <div className="md" style={{padding:"13px 17px",borderRadius:u?"18px 18px 5px 18px":"18px 18px 18px 5px",background:u?`linear-gradient(135deg,${agent.color}DD,${agent.color}AA)`:t.bub,color:u?"#0A0A0B":t.text,fontSize:15.5,lineHeight:1.75,wordBreak:"break-word",border:u?"none":`1px solid ${t.bubBrd}`,boxShadow:u?`0 4px 20px ${agent.color}40`:"0 2px 8px rgba(0,0,0,0.15)"}}
            dangerouslySetInnerHTML={u?undefined:{__html:renderMd(msg.content,agent.color,dark)}}>
            {u?msg.content:undefined}
          </div>
          <button onClick={copy} style={{position:"absolute",top:6,right:u?undefined:6,left:u?6:undefined,width:23,height:23,borderRadius:6,background:dark?"rgba(0,0,0,0.55)":"rgba(255,255,255,0.85)",border:"none",color:t.muted,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",opacity:0.7}}>{cp?"✓":"⎘"}</button>
        </div>
        <div style={{fontSize:12,color:t.muted,marginTop:4,display:"flex",gap:6,alignItems:"center"}}>
          {fmt(msg.timestamp)}
          {msg.model&&!u&&<span style={{padding:"2px 7px",borderRadius:10,background:dark?"#1A1A1C":"#F0EBE0",fontSize:11,color:t.muted,border:`1px solid ${t.border}`}}>{msg.model.split("/").pop()?.replace(":free","").slice(0,22)}</span>}
        </div>
      </div>
    </div>
  );
}

/* ── Auth screen ────────────────────────────────────────────── */

  const [tab,setTab]=useState("guest");
  const [f,setF]=useState({username:"",email:"",password:""});
  const [err,setErr]=useState("");
  const [info,setInfo]=useState("");
  const [busy,setBusy]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  const login=async()=>{setErr("");setBusy(true);
    try{const r=await fetch(`${BACKEND}/api/login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:f.username,password:f.password})});
      const d=await r.json();if(!r.ok){setErr(d.error||"Login failed.");setBusy(false);return;}

    catch(e){setErr("Cannot reach server.");}setBusy(false);};

  const register=async()=>{setErr("");setInfo("");setBusy(true);
    try{const r=await fetch(`${BACKEND}/api/register`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(f)});
      const d=await r.json();if(!r.ok){setErr(d.error||"Registration failed.");setBusy(false);return;}

          <div style={{display:"inline-flex",width:78,height:78,borderRadius:22,background:"linear-gradient(135deg,rgba(240,180,41,0.2),rgba(224,92,42,0.15))",border:"2px solid rgba(240,180,41,0.35)",alignItems:"center",justifyContent:"center",marginBottom:16,boxShadow:"0 0 50px rgba(240,180,41,0.15)"}}>
            <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,background:"linear-gradient(135deg,#F0B429,#E05C2A)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>AI</span>

              padding:"10px 20px",

              </button>
            ))}

    </div>
  );
}

/* ── Admin panel ────────────────────────────────────────────── */
function AdminPanel({onBack,t,dark,toggleTheme}){
  const ADMIN_SECRET="adelani-admin-2024";
  const [users,setUsers]=useState([]);
  const [toast,setToast]=useState("");
  const [busy,setBusy]=useState(false);
  const showT=m=>{setToast(m);setTimeout(()=>setToast(""),2600);};
  useEffect(()=>{(async()=>{setBusy(true);try{const r=await fetch(`${BACKEND}/api/admin/users?secret=${ADMIN_SECRET}`);const d=await r.json();if(Array.isArray(d))setUsers(d);}catch{}setBusy(false);})();},[]);
  const action=async(username,act)=>{
    try{const r=await fetch(`${BACKEND}/api/admin/action`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({secret:ADMIN_SECRET,username,action:act})});
      const d=await r.json();if(d.success){setUsers(p=>act==="delete"?p.filter(u=>u.username!==username):p.map(u=>u.username===username?{...u,...d.user}:u));showT("Done!");}}
    catch{showT("Server error.");}
  };
  return(
    <div style={{height:"100%",background:t.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"0 16px",height:58,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${t.border}`,background:dark?"rgba(10,10,11,0.95)":t.surf,backdropFilter:"blur(16px)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:11}}>
          <button onClick={onBack} style={{background:t.inp,border:`1px solid ${t.border}`,borderRadius:10,padding:"8px 14px",color:t.text,fontSize:14}}>← Chat</button>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:17,background:"linear-gradient(135deg,#F0B429,#E05C2A)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Admin Panel</span>
        </div>
        <button onClick={toggleTheme} style={{background:t.inp,border:`1px solid ${t.border}`,borderRadius:9,width:37,height:37,fontSize:17,display:"flex",alignItems:"center",justifyContent:"center"}}>{dark?"☀️":"🌙"}</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"20px 16px",maxWidth:820,margin:"0 auto",width:"100%"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:24}}>
          {[{l:"Total",v:users.length,e:"👥",c:"#F0B429"},{l:"Activated",v:users.filter(u=>u.activated).length,e:"✅",c:"#3ECF8E"},{l:"Pending",v:users.filter(u=>!u.activated).length,e:"⏳",c:"#FF9F2F"}].map(s=>(
            <div key={s.l} style={{background:dark?"rgba(255,255,255,0.03)":t.card,borderRadius:15,padding:"16px",border:`1px solid ${t.border}`,textAlign:"center"}}>
              <div style={{fontSize:26,marginBottom:5}}>{s.e}</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,color:s.c}}>{s.v}</div>
              <div style={{fontSize:13,color:t.muted,marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{background:dark?"rgba(255,255,255,0.02)":t.card,borderRadius:16,border:`1px solid ${t.border}`,overflow:"hidden"}}>
          {busy?<div style={{padding:40,textAlign:"center",color:t.muted,fontSize:15}}>Loading...</div>
          :users.length===0?<div style={{padding:40,textAlign:"center",color:t.muted,fontSize:15}}>No registered users yet.</div>
          :users.map((u,i)=>(
            <div key={u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"15px 17px",borderBottom:i<users.length-1?`1px solid ${t.border}`:"none",flexWrap:"wrap"}}>
              <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,rgba(240,180,41,0.25),rgba(224,92,42,0.15))",border:"1px solid rgba(240,180,41,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:700,color:"#F0B429",fontSize:16,flexShrink:0}}>{u.username[0].toUpperCase()}</div>
              <div style={{flex:1,minWidth:100}}>
                <div style={{fontWeight:600,color:t.text,fontSize:15}}>{u.username}</div>
                <div style={{fontSize:13,color:t.muted}}>{u.email||"No email"} · {u.msgCount||0} msgs</div>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{padding:"4px 10px",borderRadius:20,fontSize:12.5,fontWeight:700,background:u.activated?"rgba(62,207,142,0.14)":"rgba(255,159,47,0.14)",color:u.activated?"#3ECF8E":"#FF9F2F",border:`1px solid ${u.activated?"rgba(62,207,142,0.3)":"rgba(255,159,47,0.3)"}`}}>{u.activated?"✓ Active":"⏳ Pending"}</span>
                {!u.activated&&<button onClick={()=>action(u.username,"activate")} style={{padding:"6px 13px",borderRadius:8,background:"rgba(62,207,142,0.14)",border:"1px solid rgba(62,207,142,0.3)",color:"#3ECF8E",fontSize:13,fontWeight:600}}>Activate</button>}
                {u.activated&&<button onClick={()=>action(u.username,"deactivate")} style={{padding:"6px 13px",borderRadius:8,background:"rgba(255,159,47,0.1)",border:"1px solid rgba(255,159,47,0.3)",color:"#FF9F2F",fontSize:13}}>Revoke</button>}
                <button onClick={()=>action(u.username,u.banned?"unban":"ban")} style={{padding:"6px 13px",borderRadius:8,background:u.banned?"rgba(62,207,142,0.1)":"rgba(255,107,107,0.1)",border:`1px solid ${u.banned?"rgba(62,207,142,0.3)":"rgba(255,107,107,0.3)"}`,color:u.banned?"#3ECF8E":"#FF6B6B",fontSize:13}}>{u.banned?"Restore":"Suspend"}</button>
                <button onClick={()=>action(u.username,"delete")} style={{padding:"6px 12px",borderRadius:8,background:t.inp,border:`1px solid ${t.border}`,color:t.muted,fontSize:13}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      </div>
      {toast&&<div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:t.surf,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 22px",fontSize:14,color:t.text,boxShadow:"0 8px 30px rgba(0,0,0,0.4)",zIndex:200}}>{toast}</div>}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════════════ */
function App(){
  const [view,setView]         = useState("loading");
  const [user,setUser]         = useState(null);
  const [isGuest,setGuest]     = useState(false);
  const [theme,setTheme]       = useState("dark");
  const [agent,setAgent]       = useState(AGENTS[0]);
  const [convs,setConvs]       = useState({});
  const [input,setInput]       = useState("");
  const [busy,setBusy]         = useState(false);
  const [mic,setMic]           = useState(false);
  const [img,setImg]           = useState(null);
  const [imgP,setImgP]         = useState(null);
  const [sideOpen,setSideOpen] = useState(false);
  const [toast,setToast]       = useState("");
  const [showLimit,setShowLimit]= useState(false);
  const [mobile,setMobile]     = useState(window.innerWidth<720);

  const botRef=useRef(null),fileRef=useRef(null),recRef=useRef(null),taRef=useRef(null);
  const t=TH[theme]; const dark=theme==="dark"; const msgs=convs[agent.id]||[];

  useEffect(()=>{const fn=()=>setMobile(window.innerWidth<720);window.addEventListener("resize",fn);return()=>window.removeEventListener("resize",fn);},[]);
  useEffect(()=>{
    const th=ls.get("adelani-theme");if(th)setTheme(th);
    const ses=ls.get("adelani-session");
    if(ses&&ses.expiresAt>Date.now()){setUser(ses);setView("chat");}
    else setView("auth");
  },[]);
  const toggleTheme=()=>{const n=theme==="dark"?"light":"dark";setTheme(n);ls.set("adelani-theme",n);};
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(""),2800);};

  useEffect(()=>{const k=user?`adelani-m-${user.id}-${agent.id}`:`adelani-gm-${agent.id}`;const r=ls.get(k);if(r)setConvs(p=>({...p,[agent.id]:r}));},[agent.id,user?.id]);
  useEffect(()=>{if(!msgs.length)return;const k=user?`adelani-m-${user.id}-${agent.id}`:`adelani-gm-${agent.id}`;ls.set(k,msgs.slice(-80));},[msgs,agent.id,user?.id]);
  useEffect(()=>{botRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,busy]);

  const send=async()=>{
    const text=input.trim(); if(!text&&!img)return;
    if(user?.role!=="admin"){ if(isLimitReached()){setShowLimit(true);return;} }

    const um={role:"user",content:text||"Describe this image.",image:img,timestamp:new Date().toISOString()};
    const hist=[...msgs,um];
    setConvs(p=>({...p,[agent.id]:hist}));
    setInput("");setImg(null);setImgP(null);setBusy(true);
    if(taRef.current)taRef.current.style.height="auto";
    if(user?.role!=="admin") incrementDailyUsage();

    const ses=ls.get("adelani-session")||{};
    try{
      const r=await fetch(`${BACKEND}/api/chat`,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:hist.map(m=>({role:m.role,content:m.content})),systemPrompt:agent.system,username:ses.username||null,sessionToken:ses.sessionToken||null})});
      const d=await r.json();
      const reply=d.reply||(d.error?`⚠️ ${d.error}`:"No response.");
      setConvs(p=>({...p,[agent.id]:[...hist,{role:"assistant",content:reply,model:d.model,timestamp:new Date().toISOString()}]}));
    }catch(e){
      setConvs(p=>({...p,[agent.id]:[...hist,{role:"assistant",content:`⚠️ Cannot reach backend.\n\nError: ${e.message}`,timestamp:new Date().toISOString()}]}));
    }
    setBusy(false);
  };

  const onKey=e=>{if(e.key==="Enter"&&!e.shiftKey&&!mobile){e.preventDefault();send();}};
  const toggleMic=()=>{
    if(mic){recRef.current?.stop();setMic(false);return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showToast("Voice not supported");return;}
    const r=new SR();r.continuous=false;r.interimResults=false;
    r.onresult=e=>{setInput(p=>(p+" "+e.results[0][0].transcript).trim());setMic(false);};
    r.onend=()=>setMic(false);r.onerror=()=>setMic(false);
    recRef.current=r;r.start();setMic(true);
  };
  const handleImg=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setImg(ev.target.result.split(",")[1]);setImgP(ev.target.result);};r.readAsDataURL(f);e.target.value="";};
  const clearChat=()=>{setConvs(p=>({...p,[agent.id]:[]}));const k=user?`adelani-m-${user.id}-${agent.id}`:`adelani-gm-${agent.id}`;ls.del(k);showToast("Cleared");};
  const exportPDF=()=>{
    if(!msgs.length){showToast("Nothing to export.");return;}
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Adelani AI</title>
    <style>body{font-family:Georgia,serif;max-width:720px;margin:40px auto;color:#1a1208;padding:20px}
    h1{font-size:26px}h2{font-size:12px;color:#999;letter-spacing:2px;text-transform:uppercase;font-weight:400;margin:4px 0 28px}
    .m{margin:14px 0;padding:13px 17px;border-radius:11px}.u{background:#f5f0e3;margin-left:60px}.a{background:#fff;border:1px solid #e0d8cc;margin-right:60px}
    .role{font-size:11px;font-weight:700;text-transform:uppercase;color:#999;margin-bottom:5px}
    .txt{font-size:14.5px;line-height:1.75;white-space:pre-wrap}.ts{font-size:10px;color:#bbb;margin-top:6px}
    .ft{margin-top:40px;font-size:11px;color:#bbb;text-align:center;border-top:1px solid #eee;padding-top:18px}</style></head>
    <body><h1>Adelani AI Chat</h1><h2>${agent.name} · ${agent.role}</h2>
    ${msgs.map(m=>`<div class="m ${m.role==="user"?"u":"a"}"><div class="role">${m.role==="user"?"You":agent.name}</div>
    <div class="txt">${m.content.replace(/</g,"&lt;").replace(/\n/g,"<br>")}</div>
    <div class="ts">${new Date(m.timestamp).toLocaleString()}</div></div>`).join("")}
    <div class="ft">Adelani AI Chat · ${new Date().toLocaleString()}</div></body></html>`;
    const w=window.open("","_blank");
    if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);}
    else showToast("Allow popups to export PDF.");
  };
  const logout=()=>{ls.del("adelani-session");setUser(null);setGuest(false);setConvs({});setView("auth");};
  const switchAgent=a=>{setAgent(a);if(mobile)setSideOpen(false);};

  if(view==="loading") return(
    <div style={{height:"100%",background:"#0A0A0B",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:30,background:"linear-gradient(135deg,#F0B429,#E05C2A)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Adelani AI</div>
      <div style={{width:36,height:36,border:"3px solid rgba(240,180,41,0.2)",borderTopColor:"#F0B429",borderRadius:"50%",animation:"spin 0.9s linear infinite"}}/>
    </div>
  );
  if(view==="auth")  return <AuthScreen onAuth={u=>{setUser(u);setGuest(false);setView("chat");}} onGuest={()=>{setGuest(true);setView("chat");}} t={t} dark={dark}/>;
  if(view==="admin") return <AdminPanel onBack={()=>setView("chat")} t={t} dark={dark} themeKey={theme} toggleTheme={toggleTheme}/>;

  /* ── Sidebar inner ── */
  const SideInner=()=>(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"22px 17px 15px",borderBottom:`1px solid ${t.border}`,flexShrink:0}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:19,background:"linear-gradient(135deg,#F0B429,#E05C2A)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Adelani AI</div>
        <div style={{fontSize:10.5,color:t.muted,marginTop:2,letterSpacing:"2.5px",textTransform:"uppercase",fontWeight:600}}>Multi-Agent Chat</div>
      </div>
      <div style={{padding:"10px",borderBottom:`1px solid ${t.border}`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",borderRadius:13,background:dark?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.03)",border:`1px solid ${t.border}`}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,rgba(240,180,41,0.28),rgba(224,92,42,0.18))",border:"1.5px solid rgba(240,180,41,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:700,color:"#F0B429",fontSize:15,flexShrink:0}}>{isGuest?"G":user?.username?.[0]?.toUpperCase()||"U"}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:14.5,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isGuest?"Guest User":user?.username}</div>
            <div style={{fontSize:11.5,color:t.muted,marginTop:1}}>{user?.role==="admin"?"⚙ Administrator":"✦ Adelani AI"}</div>
          </div>
          {user?.role==="admin"&&<button onClick={()=>{setView("admin");setSideOpen(false);}} style={{padding:"4px 9px",borderRadius:7,background:"rgba(240,180,41,0.14)",border:"1px solid rgba(240,180,41,0.3)",color:"#F0B429",fontSize:12.5,fontWeight:700}}>⚙</button>}
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 9px"}}>
        <div style={{fontSize:10.5,color:t.muted,letterSpacing:"2.5px",textTransform:"uppercase",padding:"5px 9px 10px",fontWeight:700}}>AI Agents</div>
        {AGENTS.map(a=>(
          <div key={a.id} onClick={()=>switchAgent(a)} style={{padding:"11px 12px",borderRadius:13,marginBottom:3,cursor:"pointer",transition:"all 0.2s",background:agent.id===a.id?`${a.color}14`:"transparent",border:agent.id===a.id?`1px solid ${a.color}38`:"1px solid transparent",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:37,height:37,borderRadius:11,background:`linear-gradient(135deg,${a.color}26,${a.color}0E)`,border:`1px solid ${a.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:a.color,flexShrink:0,boxShadow:agent.id===a.id?`0 0 12px ${a.color}28`:"none"}}>{a.icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:600,fontSize:14.5,color:agent.id===a.id?a.color:t.text}}>{a.name}</div>
              <div style={{fontSize:12,color:t.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{a.role}</div>
            </div>
            {a.web&&<span style={{fontSize:9.5,color:a.color,background:`${a.color}1A`,padding:"2px 7px",borderRadius:10,border:`1px solid ${a.color}28`,flexShrink:0,fontWeight:700}}>LIVE</span>}
            {agent.id===a.id&&<div style={{width:5,height:5,borderRadius:"50%",background:a.color,boxShadow:`0 0 8px ${a.color}`,flexShrink:0}}/>}
          </div>
        ))}
      </div>
      <div style={{padding:"10px 10px 16px",borderTop:`1px solid ${t.border}`,flexShrink:0}}>
        <button onClick={logout} style={{width:"100%",padding:"10px",borderRadius:12,background:"transparent",border:`1px solid ${t.border}`,color:t.muted,fontSize:14}}>Sign Out</button>
      </div>
    </div>
  );

  return(
    <>
      <style>{`body{background:${t.bg}}.md code{background:${dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.06)"}}.md pre{background:${dark?"#0F0F11":"#F0EBE0"};border:1px solid ${t.border}}.md .mh1,.md .mh2,.md .mh3{color:${t.text}}textarea::placeholder{color:${t.dim}}input::placeholder{color:${t.dim}}::-webkit-scrollbar-thumb{background:${t.dim}}`}</style>

      {showLimit&&<LimitModal agent={agent} t={t} dark={dark} onClose={()=>setShowLimit(false)}/>}

      {dark&&<>
        <div style={{position:"fixed",top:"-25%",left:"-20%",width:"70%",height:"70%",borderRadius:"50%",background:`radial-gradient(circle,${agent.color}10,transparent 70%)`,pointerEvents:"none",zIndex:0,animation:"orb1 14s ease-in-out infinite"}}/>
        <div style={{position:"fixed",bottom:"-20%",right:"-15%",width:"55%",height:"55%",borderRadius:"50%",background:"radial-gradient(circle,rgba(224,92,42,0.07),transparent 70%)",pointerEvents:"none",zIndex:0,animation:"orb2 18s ease-in-out infinite"}}/>
      </>}

      <div style={{display:"flex",height:"100%",position:"relative",overflow:"hidden"}}>
        {/* Desktop sidebar */}
        {!mobile&&<div style={{width:sideOpen?260:0,minWidth:sideOpen?260:0,transition:"all 0.3s cubic-bezier(0.4,0,0.2,1)",overflow:"hidden",borderRight:`1px solid ${t.border}`,background:dark?"rgba(10,10,11,0.96)":t.surf,flexShrink:0,zIndex:10}}>
          <div style={{width:260,height:"100%"}}><SideInner/></div>
        </div>}

        {/* Mobile overlay */}
        {mobile&&sideOpen&&<>
          <div onClick={()=>setSideOpen(false)} style={{position:"fixed",inset:0,background:t.overlay,zIndex:40,animation:"fadeIn 0.2s ease"}}/>
          <div style={{position:"fixed",top:0,left:0,width:"83%",maxWidth:310,height:"100%",background:dark?"rgba(10,10,11,0.98)":t.surf,zIndex:50,borderRight:`1px solid ${t.border}`,animation:"sideIn 0.28s ease",backdropFilter:"blur(20px)"}}>
            <SideInner/>
          </div>
        </>}

        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0,zIndex:1}}>
          {/* Header */}
          <div style={{padding:`0 ${mobile?"13px":"18px"}`,height:58,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${t.border}`,background:dark?"rgba(10,10,11,0.88)":t.surf,backdropFilter:"blur(20px)",flexShrink:0,zIndex:5}}>
            <div style={{display:"flex",alignItems:"center",gap:mobile?9:12}}>
              <button onClick={()=>setSideOpen(o=>!o)} style={{background:dark?"rgba(255,255,255,0.05)":t.inp,border:`1px solid ${t.border}`,borderRadius:10,width:37,height:37,display:"flex",alignItems:"center",justifyContent:"center",color:t.muted,fontSize:16}}>
                {mobile?(sideOpen?"✕":"☰"):(sideOpen?"←":"☰")}
              </button>
              {mobile
                ?<div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:17,background:"linear-gradient(135deg,#F0B429,#E05C2A)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Adelani AI</div>
                :<><div style={{width:34,height:34,borderRadius:10,background:`${agent.color}1A`,border:`1.5px solid ${agent.color}38`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,color:agent.color,boxShadow:`0 0 12px ${agent.color}1E`}}>{agent.icon}</div>
                  <div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15.5,color:t.text}}>{agent.name}</div>
                    <div style={{fontSize:12,color:t.muted}}>{agent.role}</div>
                  </div>
                  {agent.web&&<span style={{padding:"2px 9px",borderRadius:20,background:`${agent.color}14`,border:`1px solid ${agent.color}28`,fontSize:10,color:agent.color,fontWeight:700}}>● LIVE</span>}
                </>}
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {!mobile&&<>{AGENTS.map(a=><button key={a.id} onClick={()=>setAgent(a)} title={a.name} style={{width:31,height:31,borderRadius:9,background:agent.id===a.id?`${a.color}16`:dark?"rgba(255,255,255,0.03)":t.inp,border:agent.id===a.id?`1.5px solid ${a.color}38`:`1px solid ${t.border}`,color:a.color,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>{a.icon}</button>)}
              <div style={{width:1,height:22,background:t.border}}/></>}
              <button onClick={toggleTheme} style={{background:dark?"rgba(255,255,255,0.05)":t.inp,border:`1px solid ${t.border}`,borderRadius:10,width:37,height:37,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>{dark?"☀️":"🌙"}</button>
              <button onClick={exportPDF} style={{background:dark?"rgba(255,255,255,0.05)":t.inp,border:`1px solid ${t.border}`,borderRadius:10,width:37,height:37,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",color:t.muted}}>📄</button>
              {!mobile&&<button onClick={clearChat} style={{background:dark?"rgba(255,255,255,0.04)":t.inp,border:`1px solid ${t.border}`,borderRadius:10,padding:"0 13px",height:37,color:t.muted,fontSize:13.5}}>Clear</button>}
            </div>
          </div>

          {/* Mobile agent bar */}
          {mobile&&<div style={{padding:"7px 13px",borderBottom:`1px solid ${t.border}`,background:dark?"rgba(10,10,11,0.75)":t.surf,display:"flex",alignItems:"center",gap:9,backdropFilter:"blur(12px)",flexShrink:0}}>
            <div style={{width:22,height:22,borderRadius:6,background:`${agent.color}1E`,border:`1px solid ${agent.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:agent.color,flexShrink:0}}>{agent.icon}</div>
            <span style={{fontFamily:"'Syne',sans-serif",fontWeight:600,fontSize:13.5,color:agent.color}}>{agent.name}</span>
            <span style={{fontSize:12.5,color:t.muted,flex:1}}>· {agent.role}</span>
            {agent.web&&<span style={{fontSize:10,color:agent.color,fontWeight:700}}>LIVE</span>}
            <button onClick={clearChat} style={{background:"transparent",border:`1px solid ${t.border}`,borderRadius:7,padding:"4px 10px",color:t.muted,fontSize:12}}>Clear</button>
          </div>}

          {/* Messages */}
          <div style={{flex:1,overflowY:"auto",padding:`${mobile?"16px 14px 8px":"22px 24px 8px"}`,display:"flex",flexDirection:"column",WebkitOverflowScrolling:"touch"}}>
            {msgs.length===0&&(
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"30px 18px",animation:"fup 0.5s ease",textAlign:"center"}}>
                <div style={{width:72,height:72,borderRadius:22,background:`linear-gradient(135deg,${agent.color}26,${agent.color}0E)`,border:`2px solid ${agent.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,color:agent.color,marginBottom:20,boxShadow:`0 0 40px ${agent.color}22,0 0 0 8px ${agent.color}06`}}>{agent.icon}</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:mobile?22:25,fontWeight:700,color:t.text,marginBottom:8,letterSpacing:"-0.5px"}}>Hello, I'm {agent.name}</div>
                <div style={{fontSize:15,color:t.muted,maxWidth:320,lineHeight:1.65,marginBottom:24}}>{agent.role} · Powered by Adelani AI</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",maxWidth:440}}>
                  {[agent.id==="asha"?"What can you help me with?":null,agent.id==="scholar"?"Help me design a curriculum":null,agent.id==="bizna"?"African startup ideas in 2026":null,agent.id==="dawa"?"Daily habits for better health":null,agent.id==="ubuntu"?"Teach me a Yoruba proverb":null,agent.id==="nexus"?"What's trending in AI today?":null,"Explain something powerful","Help me think through an idea"].filter(Boolean).slice(0,4).map(p=>(
                    <button key={p} onClick={()=>{setInput(p);taRef.current?.focus();}} style={{padding:"9px 15px",borderRadius:22,background:dark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.04)",border:`1px solid ${agent.color}25`,color:t.muted,fontSize:13.5}}>{p}</button>
                  ))}
                </div>
              </div>
            )}
            {msgs.map((m,i)=><Bubble key={i} msg={m} agent={agent} t={t} dark={dark}/>)}
            {busy&&(
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,animation:"fup 0.3s ease"}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:`${agent.color}18`,border:`1.5px solid ${agent.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:agent.color,flexShrink:0}}>{agent.icon}</div>
                <div style={{background:t.bub,borderRadius:"17px 17px 17px 5px",border:`1px solid ${t.bubBrd}`}}><Dots color={agent.color}/></div>
              </div>
            )}
            <div ref={botRef}/>
          </div>

          {/* Mobile bottom agent nav */}
          {mobile&&<div style={{padding:"6px 10px",borderTop:`1px solid ${t.border}`,background:dark?"rgba(10,10,11,0.94)":t.surf,display:"flex",gap:4,overflowX:"auto",flexShrink:0,backdropFilter:"blur(16px)",WebkitOverflowScrolling:"touch"}}>
            {AGENTS.map(a=><button key={a.id} onClick={()=>setAgent(a)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 12px",borderRadius:11,background:agent.id===a.id?`${a.color}16`:"transparent",border:agent.id===a.id?`1.5px solid ${a.color}38`:"1px solid transparent",color:a.color,flexShrink:0,minWidth:52}}>
              <span style={{fontSize:16}}>{a.icon}</span>
              <span style={{fontSize:10.5,fontFamily:"'Syne',sans-serif",fontWeight:600,color:agent.id===a.id?a.color:t.muted,whiteSpace:"nowrap"}}>{a.name}</span>
            </button>)}
          </div>}

          {/* Input area */}
          <div style={{padding:`8px ${mobile?"11px":"18px"} max(13px,env(safe-area-inset-bottom))`,background:dark?"rgba(10,10,11,0.96)":t.surf,backdropFilter:"blur(20px)",borderTop:`1px solid ${t.border}`,flexShrink:0}}>
            {imgP&&<div style={{marginBottom:8,position:"relative",display:"inline-block"}}>
              <img src={imgP} style={{height:64,borderRadius:11,border:`1.5px solid ${agent.color}38`}} alt=""/>
              <button onClick={()=>{setImg(null);setImgP(null);}} style={{position:"absolute",top:-8,right:-8,width:21,height:21,borderRadius:"50%",background:"#333",border:"none",color:"#fff",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>}
            <div style={{display:"flex",alignItems:"flex-end",gap:8,background:dark?"rgba(255,255,255,0.04)":t.inp,borderRadius:17,border:`1px solid ${input||img?agent.color+"40":t.border}`,padding:"9px 10px",transition:"border 0.25s,box-shadow 0.25s",boxShadow:input||img?`0 0 20px ${agent.glow}`:"none"}}>
              <button onClick={()=>fileRef.current?.click()} style={{width:36,height:36,borderRadius:10,flexShrink:0,background:dark?"rgba(255,255,255,0.04)":t.card,border:`1px solid ${t.border}`,color:t.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>📷</button>
              <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleImg} style={{display:"none"}}/>
              <textarea ref={taRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}
                placeholder={agent.web?`Ask ${agent.name} to search...`:`Message ${agent.name}...`} rows={1}
                style={{flex:1,color:t.text,fontSize:15,lineHeight:1.7,fontFamily:"'DM Sans',sans-serif",maxHeight:140,overflowY:"auto",paddingTop:4}}
                onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,140)+"px";}}/>
              <button onClick={toggleMic} style={{width:36,height:36,borderRadius:10,flexShrink:0,background:mic?`${agent.color}1E`:dark?"rgba(255,255,255,0.04)":t.card,border:mic?`1.5px solid ${agent.color}48`:`1px solid ${t.border}`,color:mic?agent.color:t.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",animation:mic?"pulse 1.3s ease infinite":"none"}}>🎤</button>
              <button onClick={send} disabled={busy||(!input.trim()&&!img)}
                style={{width:38,height:38,borderRadius:11,flexShrink:0,background:busy||(!input.trim()&&!img)?"transparent":`linear-gradient(135deg,${agent.color},${agent.color}BB)`,border:busy||(!input.trim()&&!img)?`1px solid ${t.border}`:"none",color:busy||(!input.trim()&&!img)?t.dim:"#0A0A0B",fontSize:19,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:busy||(!input.trim()&&!img)?"none":`0 4px 16px ${agent.glow}`}}>
                {busy?<div style={{width:15,height:15,border:`2px solid ${t.dim}`,borderTopColor:agent.color,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>:"↑"}
              </button>
            </div>
            {!mobile&&<div style={{textAlign:"center",fontSize:11,color:t.dim,marginTop:7,opacity:0.7}}>Adelani AI Chat · 6 Specialized Agents · Voice · Vision · Live Web</div>}
          </div>
        </div>

        {toast&&<div style={{position:"fixed",bottom:mobile?90:24,left:"50%",background:dark?"rgba(18,18,20,0.95)":"rgba(255,255,255,0.95)",border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 20px",fontSize:13.5,color:t.text,boxShadow:"0 8px 30px rgba(0,0,0,0.4)",zIndex:300,whiteSpace:"nowrap",backdropFilter:"blur(16px)",animation:"toastIn 0.3s ease",transform:"translateX(-50%)"}}>{toast}</div>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
